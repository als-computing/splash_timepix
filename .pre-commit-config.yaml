# Pre-commit configuration for splash_timepix
# See https://pre-commit.com for more information
#
# Linters and formatter versions: single source of truth in pyproject.toml [project.optional-dependencies.dev].
# Hooks prefer ./.venv (pip install -e ".[dev]") and otherwise install editable deps (pre-commit.ci).

repos:
  # Built-in pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # File format and syntax checks
      - id: trailing-whitespace
        description: Trims trailing whitespace
      - id: end-of-file-fixer
        description: Ensures files end with a newline
      - id: check-yaml
        description: Checks yaml files for parseable syntax
      - id: check-toml
        description: Checks toml files for parseable syntax
      - id: check-json
        description: Checks json files for parseable syntax

      # Python-specific checks
      - id: check-ast
        description: Check whether files parse as valid python
      - id: debug-statements
        description: Check for debugger imports and breakpoint() calls

      # Security and merge conflict checks
      - id: check-merge-conflict
        description: Check for files that contain merge conflict strings
      - id: check-added-large-files
        description: Prevent giant files from being committed
        args: ['--maxkb=1000']

  # black / isort / flake8 — versions from pyproject.toml via scripts/precommit_lint.sh
  - repo: local
    hooks:
      - id: lint
        name: black / isort / flake8
        language: system
        entry: bash scripts/precommit_lint.sh
        pass_filenames: false
        always_run: true

  # Default pytest suite (addopts from pyproject only; CI uses pytest -m "" for full collection)
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        language: system
        entry: bash scripts/precommit_pytest.sh
        pass_filenames: false
        always_run: true

# Configuration for CI mode
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autofix_prs: true
  autoupdate_schedule: weekly
  skip: []
  submodules: false
